<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind PDF - Cognitive Synthesis Architecture</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
    }
    #container {
      width: 100%;
      min-height: 100vh;
      overflow-y: auto;
      padding: 20px 0;
      box-sizing: border-box;
    }
    #loading, #error {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.4em;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      background: white;
      z-index: 10;
    }
    #error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef5350;
      max-width: 90%;
      text-align: center;
    }
    canvas {
      display: block;
      margin: 30px auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border-radius: 6px;
      background: white;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="loading">Loading Mind PDF (12 pages)...</div>
    <div id="error" style="display: none;">
      Failed to load or render the PDF.<br>
      <a href="https://cdn.jsdelivr.net/gh/arthulian/outline@main/mind.pdf" style="color: #d32f2f; font-weight: bold;">Download mind.pdf</a>
      <br><br>
      <small>Details will appear in browser console (F12).</small>
    </div>
  </div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

    // Reliable CDN URL for your PDF
    const pdfUrl = 'https://cdn.jsdelivr.net/gh/arthulian/outline@main/mind.pdf';

    const loadingTask = pdfjsLib.getDocument(pdfUrl);

    loadingTask.promise.then(pdf => {
      console.log(`PDF loaded successfully — ${pdf.numPages} pages`);

      const container = document.getElementById('container');
      document.getElementById('loading').style.display = 'none';

      // Render each page
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        pdf.getPage(pageNum).then(page => {
          // 1. Get natural dimensions (scale 1.0)
          const naturalViewport = page.getViewport({ scale: 1.0 });

          // 2. Calculate scale to fit container width with margin
          const margin = 60; // total left + right padding in pixels
          const targetWidth = container.clientWidth - margin;
          let scale = targetWidth / naturalViewport.width;

          // Optional: set a reasonable minimum scale so text doesn't become microscopic
          scale = Math.max(0.28, scale); // ~0.28–0.45 is typical for 960pt wide slides

          // 3. Apply the computed scale
          const viewport = page.getViewport({ scale });

          // 4. Create canvas
          const canvas = document.createElement('canvas');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          container.appendChild(canvas);

          // 5. Render
          const renderContext = {
            canvasContext: canvas.getContext('2d'),
            viewport: viewport
          };

          page.render(renderContext).promise.then(() => {
            console.log(`Page ${pageNum} rendered at scale ${scale.toFixed(3)} (natural width: ${naturalViewport.width} pt)`);
          }).catch(renderErr => {
            console.error(`Render error on page ${pageNum}:`, renderErr);
          });
        }).catch(pageErr => {
          console.error(`Failed to get page ${pageNum}:`, pageErr);
        });
      }
    }).catch(err => {
      console.error('PDF loading failed:', err);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').innerHTML += `<br><br>Error: ${err.message || 'Unknown error'}`;
    });
  </script>
</body>
</html>
